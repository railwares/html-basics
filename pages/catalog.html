<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог курсів</title>
  <link rel="stylesheet" href="../styles/style.css">
  <link rel="stylesheet" href="../styles/responsive.css">
  <script src="../js/main.js" defer></script>
  <script src="../js/api.js" defer></script>
  <script src="../js/ui.js" defer></script>
  <script src="../js/catalog.js" defer></script>
  <script src="../js/form.js" defer></script>
  <script src="../js/main.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
      <div class="header-controls">
        <button class="theme-toggle" aria-label="Перемикач теми">🌙 Тема</button>
        <button class="burger-btn" aria-expanded="false">☰</button>
      </div>
      <nav>
        <ul class="nav-list">
          <li><a href="../index.html">Головна</a></li>
          <li><a href="./about.html">Про мене</a></li>
          <li><a href="./catalog.html" class="active">Каталог</a></li>
          <li><a href="./contact.html">Контакти</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container main-content">
    <h1>Каталог курсів</h1>

    <div style="margin-bottom: 20px;">
     <a href="./item-form.html" class="btn-primary" style="text-decoration:none;">+ Додати новий курс</a>
    </div>
    
    <div class="controls-panel card">
      <input type="text" id="search-input" placeholder="Пошук за назвою...">
      
      <select id="category-filter">
        <option value="all">Усі категорії</option>
        <option value="frontend">Frontend</option>
        <option value="backend">Backend</option>
        <option value="design">Дизайн</option>
      </select>

      <select id="sort-select">
        <option value="default">За замовчуванням</option>
        <option value="price-asc">Від дешевих до дорогих</option>
        <option value="price-desc">Від дорогих до дешевих</option>
        <option value="name-asc">За алфавітом (А-Я)</option>
      </select>
    </div>

    <div id="state-loading" class="state-message">⏳ Завантаження даних...</div>
    <div id="state-error" class="state-message error-text hidden">❌ Виникла помилка під час завантаження. Спробуйте пізніше.</div>
    <div id="state-empty" class="state-message hidden">🔍 За вашим запитом нічого не знайдено.</div>

    <div class="catalog-grid" data-catalog></div>

    <div class="pagination-wrapper hidden" id="pagination-wrapper">
      <button id="btn-show-more" class="btn-primary">Показати ще</button>
    </div>
  </main>

  <div id="details-modal" class="modal-overlay hidden">
    <div class="modal-content card" style="max-width: 500px; padding: 20px;">
      <button class="modal-close" id="modal-close">&times;</button>
      <div id="modal-body">
        </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; <span class="current-year">2026</span></p>
    </div>
  </footer>
</body>
</html>
