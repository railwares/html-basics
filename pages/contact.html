<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Сторінка контактів. Заповніть форму зворотного зв'язку, щоб написати мені.">
  <title>Контакти - Мій перший HTML-сайт</title>
  <script src="../js/main.js" defer></script>
  <link rel="stylesheet" href="../styles/style.css">
  <link rel="stylesheet" href="../styles/responsive.css">
</head>
<body>
<header class="site-header">
  <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
    
    <div class="header-controls">
      <button class="theme-toggle" aria-label="Перемикач теми">🌙 Тема</button>
      <button class="burger-btn" aria-expanded="false" aria-label="Меню навігації">☰</button>
    </div>

    <nav>
      <ul class="nav-list">
        <li><a href="../index.html">Головна</a></li>
        <li><a href="./about.html">Про мене</a></li>
        <li><a href="./catalog.html">Каталог</a></li>
        <li><a href="./contact.html">Контакти</a></li>
      </ul>
    </nav>
    
  </div>
</header>

  <main class="container main-content">
    <section class="card form-section">
      <h1>Зв'яжіться зі мною</h1>
      <div id="form-success" class="card hidden" style="background-color: #d1fae5; border-color: #10b981;">
        </div>
      <form action="./submit.html" method="get" class="contact-form">
        
        <div class="form-group">
          <label for="name">Ім'я (обов'язково):</label>
          <input id="name" name="name" type="text" required minlength="2" maxlength="30" placeholder="Ваше ім'я">
        </div>

        <div class="form-group">
          <label for="email">Email (обов'язково):</label>
          <input id="email" name="email" type="email" required placeholder="example@mail.com">
        </div>

        <div class="form-group">
          <label for="phone">Телефон (за бажанням):</label>
          <input id="phone" name="phone" type="tel" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" placeholder="050-123-4567">
          <small><em>Формат: 050-123-4567</em></small>
        </div>

        <div class="form-group">
          <label for="topic">Тема звернення:</label>
          <select id="topic" name="topic">
            <option value="study">Навчання та питання</option>
            <option value="work">Пропозиція співпраці</option>
            <option value="feedback">Відгук про сайт</option>
            <option value="other">Інше</option>
          </select>
        </div>

        <fieldset class="form-group">
          <legend>Зручний спосіб зв'язку</legend>
          <label class="radio-label">
            <input type="radio" name="contactWay" value="email" checked> Email
          </label>
          <label class="radio-label">
            <input type="radio" name="contactWay" value="phone"> Телефон
          </label>
        </fieldset>

        <div class="form-group">
          <label for="message">Повідомлення:</label>
          <textarea id="message" name="message" rows="5" required minlength="10" placeholder="Напишіть ваше повідомлення тут..."></textarea>
          <small id="char-count" style="display:block; text-align:right; color:#6b7280;"></small>
        </div>

        <div class="form-group checkbox-group">
          <label>
            <input type="checkbox" name="agree" required>
            Я погоджуюсь на обробку моїх даних згідно з правилами.
          </label>
        </div>

        <div class="form-group">
          <button type="submit" class="btn-primary">Надіслати</button>
          <button type="reset" style="margin-top: 10px; width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #d9e2ec; background: transparent; cursor: pointer;">Очистити форму</button>
        </div>

      </form>
    </section>
  </main>

<footer class="site-footer">
  <div class="container">
    <p>&copy; <span class="current-year">2026</span> Завадський М.Р.</p>
  </div>
  
  <button class="back-to-top hidden" aria-label="Повернутися вгору">↑</button>
</footer>
</body>
</html>
