<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Керування записом</title>
  <link rel="stylesheet" href="../styles/style.css">
  <link rel="stylesheet" href="../styles/responsive.css">
  
  <script src="../js/api.js" defer></script>
  <script src="../js/ui.js" defer></script>
  <script src="../js/catalog.js" defer></script>
  <script src="../js/form.js" defer></script>
  <script src="../js/main.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="container"><nav><ul class="nav-list">
      <li><a href="../index.html">Головна</a></li>
      <li><a href="./catalog.html">Каталог</a></li>
    </ul></nav></div>
  </header>

  <main class="container main-content">
    <section class="card form-section">
      <h1 id="form-page-title">Створення нового курсу</h1>
      <form id="crud-form" class="contact-form">
        <div class="form-group">
          <label for="title">Назва курсу (мін. 3 символи):</label>
          <input type="text" id="title" name="title" required>
        </div>
        <div class="form-group">
          <label for="category">Категорія:</label>
          <select id="category" name="category" required>
            <option value="frontend">Frontend</option>
            <option value="backend">Backend</option>
            <option value="design">Дизайн</option>
          </select>
        </div>
        <div class="form-group">
          <label for="price">Ціна (грн):</label>
          <input type="number" id="price" name="price" min="0" required>
        </div>
        <div class="form-group">
          <label for="image">URL обкладинки:</label>
          <input type="url" id="image" name="image" value="https://picsum.photos/seed/picsum/400/250" required>
        </div>
        <div class="form-group">
          <label for="description">Опис:</label>
          <textarea id="description" name="description" rows="4" required></textarea>
        </div>
        <button type="submit" class="btn-primary">Зберегти запис</button>
      </form>
    </section>
  </main>
</body>
</html>
